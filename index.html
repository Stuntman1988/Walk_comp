<!DOCTYPE html>
<html>

<head>
    <title>Stegtävling</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load('current', {
            packages: ['corechart']
        });
    </script>
    <style>
        body {
            background-color: rgb(167, 167, 167);
        }
        #topplista {
            font-family: 'Mochiy Pop One', sans-serif;
            position: relative;
            margin: 10px;
            z-index: 1;
        }
        #container {
            width: 550px;
            height: 1500px; 
            margin: 0 auto; 
            margin-top: -120px;
        }
        #pic{
            text-align: center;
            position: relative;
            z-index: 0;
            margin-top: -100px;
        }
        i{
            color: rgb(236, 213, 0);
        }
    </style>
</head>

<body>

    <div id="topplista">
        <h3>Topplista - Vecka 29 <br>
            1: Robin & Isabell: 3 608 544 <i class='bx bx-crown bx-tada'></i><br>
            2: Eva & Christer: 3 426 245 <br>
            3: Bosse & Annika: 1 842 410 <br>
            4: Crisse & Sofia: 1 493 610 - ej upd 13v<br>
            5: Johan & Linda: 844 020 - ej upd 20v <br>
            </h3>
    </div>

    <div id="container"></div>
    <script language="JavaScript">
        function drawChart() {
            /* Define the chart to be drawn.*/
            var data = google.visualization.arrayToDataTable([
                ['Page Vist', 'Totalt antal steg', 'MÅL'],
                ['B&A', 1842410, 3541429],
                ['C&S', 1493610, 3541429],
                ['R&I', 3608544, 3541429],
                ['E&C', 3426245, 3541429],
                ['J&L', 844020, 3541429]

            ]);
            var options = {
                title: 'Steg mot Barcelona: 3 541 429 steg',
                isStacked: true,
                seriesType: 'bars', // Använd staplar
                series: {
                    0: { color: 'beige' },
                    1: { color: 'red', type: 'line' } // Använd linje för Maxvärde-serien
                },
                vAxis: { minValue: 0 },
                backgroundColor: 'rgb(167, 167, 167)'

            };
            
            var chart = new google.visualization.ComboChart(document.getElementById('container'));
            chart.draw(data, options);
        }
        google.charts.setOnLoadCallback(drawChart);
    </script>

    <div id="pic">
        <img src="pic.png" alt="error">
    </div>

</body>

</html>
